[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"

# SPA routing — serve index.html for client-side routes
# Netlify Functions automatically take priority over redirects,
# so /api/contact will be handled by the serverless function
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
