server:
  port: ${PORT:8080}

spring:
  application:
    name: therapy-backend

  # Database - Local dev defaults to H2
  # Production: TherapyApplication.main() reads DATABASE_URL and sets spring.datasource.url
  datasource:
    url: jdbc:h2:mem:therapydb
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: ${JPA_PLATFORM:}

  # H2 console for local dev only
  h2:
    console:
      enabled: ${H2_CONSOLE:false}
      path: /h2-console

  # Disable auto-config for mail (we use Resend HTTP API instead of SMTP)
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.mail.MailAutoConfiguration

# App-specific config
app:
  notification-email: ${NOTIFICATION_EMAIL:rashisharmapsychotherapy@outlook.com}
  from-email: ${FROM_EMAIL:onboarding@resend.dev}
  resend-api-key: ${RESEND_API_KEY:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
