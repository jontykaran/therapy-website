server:
  port: ${PORT:8080}

spring:
  application:
    name: therapy-backend

  # Database - auto-detects driver from URL
  # Local dev: defaults to H2
  # Production: set SPRING_DATASOURCE_URL=jdbc:postgresql://host:port/db
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:therapydb}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: ${JPA_PLATFORM:}

  # H2 console for local dev only
  h2:
    console:
      enabled: ${H2_CONSOLE:false}
      path: /h2-console

  # Email (SMTP)
  mail:
    host: ${SMTP_HOST:smtp-mail.outlook.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# App-specific config
app:
  notification-email: ${NOTIFICATION_EMAIL:Rashisharmapsychotherapy@outlook.com}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
