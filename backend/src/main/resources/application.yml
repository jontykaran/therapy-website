server:
  port: ${PORT:8080}

spring:
  application:
    name: therapy-backend

  # Database - Local dev defaults to H2
  # Production: TherapyApplication.main() reads DATABASE_URL and sets spring.datasource.url
  datasource:
    url: jdbc:h2:mem:therapydb
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: ${JPA_PLATFORM:}

  # H2 console for local dev only
  h2:
    console:
      enabled: ${H2_CONSOLE:false}
      path: /h2-console

  # Email (SMTP) - Resend.com via port 465 SSL
  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USER:resend}
    password: ${SMTP_PASSWORD:}
    protocol: smtps
    properties:
      mail:
        smtps:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

# App-specific config
app:
  notification-email: ${NOTIFICATION_EMAIL:Rashisharmapsychotherapy@outlook.com}
  from-email: ${FROM_EMAIL:onboarding@resend.dev}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
