<svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8BA89F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8D5BA;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-text { font-family: 'Playfair Display', serif; font-weight: 600; }
      .logo-subtext { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Leaf element -->
  <g transform="translate(10, 15)">
    <path d="M 20 2 Q 30 8, 32 18 Q 31 28, 20 33 Q 12 28, 10 18 Q 11 8, 20 2"
          fill="url(#leafGradient)" opacity="0.9"/>
    <path d="M 20 2 Q 20 12, 20 33" stroke="#A8D5BA" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M 15 10 Q 17 14, 20 18" stroke="#A8D5BA" stroke-width="0.6" fill="none" opacity="0.4"/>
    <path d="M 25 10 Q 23 14, 20 18" stroke="#A8D5BA" stroke-width="0.6" fill="none" opacity="0.4"/>
  </g>

  <!-- Text: "Therapy By Rashi" -->
  <text x="65" y="52" class="logo-text" font-size="24" fill="#5A7A72">
    Therapy By Rashi
  </text>

  <!-- Decorative accent line -->
  <line x1="65" y1="57" x2="290" y2="57" stroke="#A8D5BA" stroke-width="1.5" opacity="0.4"/>
</svg>