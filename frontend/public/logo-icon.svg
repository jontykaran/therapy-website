<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8BA89F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8D5BA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Subtle background circle for context -->
  <circle cx="50" cy="50" r="48" fill="#F8FAFB" opacity="0.5"/>

  <!-- Leaf element centered -->
  <g transform="translate(50, 50)">
    <!-- Main leaf shape -->
    <path d="M 18 -15 Q 25 -8, 26 0 Q 25 12, 18 18 Q 10 12, 9 0 Q 10 -8, 18 -15"
          fill="url(#leafGradient)" opacity="0.95"/>

    <!-- Leaf vein -->
    <path d="M 18 -15 Q 18 0, 18 18" stroke="#A8D5BA" stroke-width="1" fill="none" opacity="0.7"/>

    <!-- Secondary veins -->
    <path d="M 12 -8 Q 15 -3, 18 0" stroke="#A8D5BA" stroke-width="0.7" fill="none" opacity="0.5"/>
    <path d="M 24 -8 Q 21 -3, 18 0" stroke="#A8D5BA" stroke-width="0.7" fill="none" opacity="0.5"/>
    <path d="M 11 6 Q 14 9, 18 11" stroke="#A8D5BA" stroke-width="0.7" fill="none" opacity="0.5"/>
    <path d="M 25 6 Q 22 9, 18 11" stroke="#A8D5BA" stroke-width="0.7" fill="none" opacity="0.5"/>
  </g>
</svg>