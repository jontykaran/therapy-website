<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for icon version -->
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8BA89F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8D5BA;stop-opacity:1" />
    </linearGradient>
    <style>
      .logo-text { font-family: 'Playfair Display', serif; font-weight: 600; }
      .logo-subtext { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Leaf element (organic shape) -->
  <g transform="translate(50, 45)">
    <!-- Main leaf shape -->
    <path d="M 40 5 Q 55 15, 60 35 Q 58 55, 40 65 Q 25 55, 20 35 Q 22 15, 40 5"
          fill="url(#leafGradient)" opacity="0.9"/>

    <!-- Leaf vein -->
    <path d="M 40 5 Q 40 25, 40 65" stroke="#A8D5BA" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Secondary veins -->
    <path d="M 30 20 Q 35 28, 40 35" stroke="#A8D5BA" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 50 20 Q 45 28, 40 35" stroke="#A8D5BA" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 28 40 Q 34 45, 40 48" stroke="#A8D5BA" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 52 40 Q 46 45, 40 48" stroke="#A8D5BA" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Decorative water drop (subtle, bottom right) -->
  <path d="M 110 60 Q 115 55, 115 50 Q 115 45, 110 45 Q 105 45, 105 50 Q 105 55, 110 60"
        fill="#D4A574" opacity="0.6"/>

  <!-- Text: "THERAPY BY RASHI" -->
  <text x="100" y="135" class="logo-text" font-size="18" text-anchor="middle" fill="#5A7A72">
    Therapy By Rashi
  </text>

  <!-- Subtle decorative line -->
  <line x1="60" y1="145" x2="140" y2="145" stroke="#A8D5BA" stroke-width="1" opacity="0.4"/>

  <!-- Optional: Tagline or subtitle (smaller) -->
  <text x="100" y="160" class="logo-subtext" font-size="9" text-anchor="middle" fill="#8BA89F" opacity="0.8" letter-spacing="2">
    PERSON-CENTRED THERAPY
  </text>
</svg>